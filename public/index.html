<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Drop · Quick file share</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<!-- Login Gate -->
<div id="loginGate" class="gate">
  <div class="gate-card">
    <div class="gate-icon">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1 class="gate-title">Drop</h1>
    <p class="gate-sub">Enter password to continue</p>
    <form id="loginForm" class="gate-form">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" id="loginBtn">
        <span class="btn-label">Unlock</span>
      </button>
    </form>
    <p class="gate-error" id="loginError"></p>
  </div>
</div>

<!-- Main App -->
<main id="app" class="app" hidden>
  <header class="header">
    <div class="brand">
      <div class="brand-dot"></div>
      <span>Drop</span>
    </div>
    <button class="logout-btn" id="logoutBtn" title="Sign out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </header>

  <!-- Upload Card -->
  <section class="card upload-card" id="uploadCard">
    <div id="dropzone" class="dropzone">
      <div class="dz-content" id="dzContent">
        <div class="dz-icon">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h2 class="dz-title">Drop file here</h2>
        <p class="dz-sub">or <button type="button" class="dz-browse" id="browseBtn">browse</button> from your device</p>
        <p class="dz-hint">No size limit · Multipart upload</p>
      </div>

      <!-- Progress state -->
      <div class="dz-progress" id="dzProgress" hidden>
        <div class="prog-file">
          <div class="prog-file-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="prog-file-info">
            <div class="prog-file-name" id="progFileName">filename.zip</div>
            <div class="prog-file-meta" id="progFileMeta">0 MB / 0 MB</div>
          </div>
        </div>
        <div class="prog-bar">
          <div class="prog-bar-fill" id="progBarFill"></div>
        </div>
        <div class="prog-status" id="progStatus">Uploading…</div>
      </div>

      <!-- Success state -->
      <div class="dz-success" id="dzSuccess" hidden>
        <div class="success-check">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h3 class="success-title">Uploaded</h3>
        <p class="success-file" id="successFile">file.zip</p>
        <div class="link-box">
          <input type="text" id="resultLink" readonly />
          <button id="copyBtn" class="copy-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Copy</span>
          </button>
        </div>
        <button class="new-upload-btn" id="newUploadBtn">Upload another</button>
      </div>
    </div>

    <input type="file" id="fileInput" hidden />
  </section>

  <!-- History -->
  <section class="history-section">
    <div class="history-head">
      <h2>History</h2>
      <button id="refreshBtn" class="refresh-btn" title="Refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>

    <div id="historyList" class="history-list">
      <div class="history-empty" id="historyEmpty">
        <p>No uploads yet</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <span>Stored on Cloudflare R2</span>
  </footer>
</main>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="/app.js"></script>
</body>
</html>
